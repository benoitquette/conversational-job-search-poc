# Elasticsearch ML node — runs ON bowmore (192.168.68.51, modern CPU with AVX2).
# Joins the mp-search cluster as an ML-only node so ELSER's PyTorch inference runs here
# (kilchoman's 2013 CPU crashes libtorch with SIGILL). Holds no data; loads models for inference.
# Host networking so it can join over transport 9300. Security off (LAN-only).
services:
  elasticsearch-ml:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.1
    container_name: mp-search-es-ml
    network_mode: host
    environment:
      - cluster.name=mp-search
      - node.name=bowmore
      - node.roles=ml,remote_cluster_client
      - network.host=0.0.0.0
      - network.publish_host=192.168.68.51
      - http.port=9200
      - transport.port=9300
      - discovery.seed_hosts=192.168.68.56:9300
      - xpack.security.enabled=false
      - xpack.license.self_generated.type=trial
      - xpack.ml.enabled=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=false
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    mem_limit: 6g
